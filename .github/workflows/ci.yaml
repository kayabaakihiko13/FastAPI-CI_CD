name: ci pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ─────────────────────────────────────
  # Job 1: Run Tests
  # ─────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python with uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        enable-cache: true
        cache-dependency-glob: 'uv.lock'

    - name: Install dependencies
      run: uv sync --dev
    - name: Run pytest
      run: uv run pytest tester.py -v --tb=short

    # Optional: Upload test results
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ runner.os }}
        path: |
          .pytest_cache/
          htmlcov/
        retention-days: 7

  # ─────────────────────────────────────
  # Job 2: Linting & Formatting (Ruff)
  # ─────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python with uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        enable-cache: true

    - name: Install dependencies
      run: uv sync --dev

    - name: Run Ruff lint
      run: uv run ruff check .

    - name: Run Ruff format check
      run: uv run ruff format --check .
